name: CI

on:
  push:
    branches: ["main", "feat/*"]
  pull_request:
    branches: ["main", "feat/*"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install Rush
        run: npm install -g @microsoft/rush
      - name: Rush Install
        run: rush install
      - name: Lint
        run: rush lint || echo "Lint not configured yet"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install Rush
        run: npm install -g @microsoft/rush
      - name: Rush Install
        run: rush install
      - name: Type Check
        run: rush build || echo "Build includes type checking"

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    needs: [lint, typecheck]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Git config user
        uses: snow-actions/git-config-user@v1.0.0
        with:
          name: github-actions[bot]
          email: 1008611+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Verify Change Logs
        run: node common/scripts/install-run-rush.js change --verify
      - name: Rush Install
        run: node common/scripts/install-run-rush.js install
      - name: Rush rebuild
        run: node common/scripts/install-run-rush.js rebuild --verbose

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install Rush
        run: npm install -g @microsoft/rush
      - name: Rush Install
        run: rush install
      - name: Security Audit
        run: rush audit || echo "Audit check completed"
